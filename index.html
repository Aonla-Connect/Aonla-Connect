<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aonla Connect | Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden-tab { display: none; }
        .active-tab { display: flex; }
        .ai-glow { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden font-sans">

    <div id="auth-overlay" class="fixed inset-0 bg-indigo-900 z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Aonla Connect</h2>
            <p class="text-slate-500 text-sm mb-6">Enter phone to join the community</p>
            
            <div id="phone-step">
                <input type="tel" id="phone-num" placeholder="+91 00000-00000" class="w-full border p-3 rounded-lg mb-4 outline-none focus:border-indigo-600">
                <button onclick="sendOTP()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Send OTP</button>
            </div>

            <div id="otp-step" class="hidden">
                <input type="text" id="otp-code" placeholder="Enter 6-digit OTP" class="w-full border p-3 rounded-lg mb-4 outline-none">
                <input type="text" id="reg-name" placeholder="Your Real Name" class="w-full border p-3 rounded-lg mb-4 outline-none">
                <button onclick="verifyOTP()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Verify & Join</button>
            </div>
        </div>
    </div>

    <div class="flex w-full h-full">
        
        <div class="w-85 bg-white border-r flex flex-col shadow-lg z-10">
            <div class="p-5 bg-indigo-700 text-white flex justify-between items-center">
                <h1 class="font-bold text-lg">Aonla Connect</h1>
                <div class="flex gap-4">
                    <button onclick="showTab('chat-list')"><i class="fas fa-comment-dots"></i></button>
                    <button onclick="showTab('user-search')"><i class="fas fa-user-plus"></i></button>
                    <button onclick="showTab('settings')"><i class="fas fa-cog"></i></button>
                </div>
            </div>

            <div id="tab-chat-list" class="flex-1 overflow-y-auto active-tab flex-col">
                <div onclick="openChat('self')" class="p-4 flex items-center gap-3 hover:bg-slate-50 cursor-pointer border-b">
                    <div class="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center text-slate-600"><i class="fas fa-bookmark"></i></div>
                    <div><p class="font-bold text-sm">Saved Messages (Self)</p><p class="text-xs text-slate-400">Note to yourself</p></div>
                </div>
                <div onclick="openChat('main')" class="p-4 flex items-center gap-3 bg-indigo-50 border-l-4 border-indigo-600 cursor-pointer">
                    <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="fas fa-city"></i></div>
                    <div><p class="font-bold text-sm">Aonla Connect (Main)</p><p class="text-xs text-indigo-500">Global Town Group</p></div>
                </div>
            </div>

            <div id="tab-user-search" class="flex-1 overflow-y-auto hidden-tab flex-col p-4">
                <input type="text" placeholder="Search residents..." class="w-full bg-slate-100 p-2 rounded-lg text-sm mb-4">
                <div id="global-users" class="space-y-3">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">People in Aonla/Bareilly</p>
                </div>
            </div>

            <div id="tab-settings" class="flex-1 overflow-y-auto hidden-tab flex-col p-6">
                <h3 class="font-bold mb-4">Settings</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center p-2 border-b"><span>Dark Mode</span><input type="checkbox"></div>
                    <div class="flex justify-between items-center p-2 border-b"><span>Privacy</span><i class="fas fa-chevron-right text-slate-300"></i></div>
                    <button onclick="logout()" class="text-red-500 font-bold p-2">Logout</button>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#e5ddd5]">
            <div class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm">
                <div class="flex items-center gap-3">
                    <div id="active-chat-icon" class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center font-bold text-indigo-600 text-sm">A</div>
                    <div><h2 id="active-chat-name" class="font-bold text-slate-800 text-sm">Aonla Connect</h2><p id="active-chat-status" class="text-[10px] text-green-500 font-bold">1,240 Online</p></div>
                </div>
                <div class="flex gap-6 text-slate-500">
                    <button onclick="startCall('voice')"><i class="fas fa-phone-alt"></i></button>
                    <button onclick="startCall('video')"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                </div>

            <div class="p-4 bg-white">
                <div class="flex items-center gap-3 bg-slate-100 rounded-full px-4 py-2">
                    <button class="text-slate-400"><i class="fas fa-plus"></i></button>
                    <input type="text" id="msg-input" placeholder="Message..." class="flex-1 bg-transparent outline-none text-sm">
                    <button onclick="sendMsg()" class="text-indigo-600 font-bold">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TAB SWITCHING LOGIC
        function showTab(tabName) {
            document.querySelectorAll('.hidden-tab, .active-tab').forEach(el => {
                el.classList.add('hidden-tab');
                el.classList.remove('active-tab');
            });
            document.getElementById('tab-' + tabName).classList.add('active-tab');
            document.getElementById('tab-' + tabName).classList.remove('hidden-tab');
        }

        // AUTH LOGIC
        function sendOTP() {
            const phone = document.getElementById('phone-num').value;
            if(phone.length >= 10) {
                document.getElementById('phone-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
                alert("OTP Sent to " + phone); // Static for now, integrate Supabase Auth for real
            }
        }

        function verifyOTP() {
            const name = document.getElementById('reg-name').value;
            if(name) {
                localStorage.setItem('userName', name);
                document.getElementById('auth-overlay').classList.add('hidden');
                initUser(name);
            }
        }

        // CHAT WITH SELF & OTHERS
        function openChat(type) {
            const headerName = document.getElementById('active-chat-name');
            const headerStatus = document.getElementById('active-chat-status');
            
            if(type === 'self') {
                headerName.innerText = "Saved Messages (You)";
                headerStatus.innerText = "Chat with yourself";
            } else {
                headerName.innerText = "Aonla Connect";
                headerStatus.innerText = "1,240 Online";
            }
            document.getElementById('chat-messages').innerHTML = ""; // Clear for new chat
        }

        // CALLS LOGIC
        function startCall(type) {
            alert(type + " call feature requires ZegoCloud SDK. Integrating soon!");
        }

        // CHECK LOGIN ON LOAD
        window.onload = () => {
            const savedName = localStorage.getItem('userName');
            if(savedName) {
                document.getElementById('auth-overlay').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
